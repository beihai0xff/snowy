name: ci

on:
  push:
    branches:
      - main
      - feat/**
      - feature/**
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run unit tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build
        run: go build ./...

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Download dependencies
        run: go mod download

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run Docker-backed integration matrix
        run: bash ./scripts/test.sh --integration --keep-deps

      - name: Dump Docker status on failure
        if: failure()
        run: |
          mkdir -p artifacts
          docker compose -f deployments/docker/docker-compose.yml -p snowy ps | tee artifacts/docker-ps.txt
          docker compose -f deployments/docker/docker-compose.yml -p snowy logs --no-color | tee artifacts/docker-compose.log

      - name: Upload Docker logs artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-integration-logs
          path: artifacts/

      - name: Cleanup Docker dependencies
        if: always()
        run: |
          docker compose -f deployments/docker/docker-compose.yml -p snowy down -v --remove-orphans || true



