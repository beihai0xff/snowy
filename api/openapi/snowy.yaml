openapi: "3.1.0"
info:
  title: Snowy API
  description: |
    Snowy AIGC 学习平台 API — 面向高中生的知识检索、物理建模、生物建模。
    参考技术方案 §17。
  version: "0.1.0"

servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发

paths:
  /agent/chat:
    post:
      summary: Agent 会话
      description: 统一问答入口，支持 SSE 流式。Accept text/event-stream 时进入流式模式。
      tags: [Agent]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'

  /agent/sessions:
    post:
      summary: 创建会话
      tags: [Agent]
      responses:
        '200':
          description: 成功

  /agent/sessions/{id}:
    get:
      summary: 获取会话详情
      tags: [Agent]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功

  /agent/sessions/{id}/messages:
    get:
      summary: 获取会话消息
      tags: [Agent]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功

  /search/query:
    post:
      summary: 知识检索
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchQueryRequest'
      responses:
        '200':
          description: 成功

  /modeling/physics/analyze:
    post:
      summary: 物理解析
      tags: [Physics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhysicsAnalyzeRequest'
      responses:
        '200':
          description: 成功

  /modeling/physics/simulate:
    post:
      summary: 物理调参
      tags: [Physics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhysicsSimulateRequest'
      responses:
        '200':
          description: 成功

  /modeling/biology/analyze:
    post:
      summary: 生物建模解析
      tags: [Biology]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BiologyAnalyzeRequest'
      responses:
        '200':
          description: 成功

  /auth/google/callback:
    post:
      summary: Google OAuth 登录
      description: 前端传入 Google ID Token，后端验证后签发 JWT token 对。新用户自动注册。
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
      responses:
        '200':
          description: 成功

  /user/profile:
    get:
      summary: 获取用户资料
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功

  /history:
    get:
      summary: 历史记录
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功

  /favorites:
    get:
      summary: 收藏列表
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
    post:
      summary: 添加收藏
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoriteRequest'
      responses:
        '201':
          description: 收藏成功

  /recommendations:
    get:
      summary: 首页推荐数据
      tags: [Home]
      responses:
        '200':
          description: 成功

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    APIResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: object
        request_id:
          type: string

    ChatRequest:
      type: object
      required: [message]
      properties:
        session_id:
          type: string
        message:
          type: string
        mode:
          type: string
          enum: [search, physics, biology, auto]
        filters:
          type: object
          properties:
            subject:
              type: string
            grade:
              type: string

    SearchQueryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        session_id:
          type: string
        filters:
          type: object
          properties:
            subject:
              type: string
            grade:
              type: string
            chapter:
              type: string
            source:
              type: string

    PhysicsAnalyzeRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
        context:
          type: string

    PhysicsSimulateRequest:
      type: object
      required: [model_type, parameters]
      properties:
        model_type:
          type: string
        parameters:
          type: object
          additionalProperties:
            type: number

    BiologyAnalyzeRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
        context:
          type: string

    GoogleLoginRequest:
      type: object
      required: [id_token]
      properties:
        id_token:
          type: string
          description: Google ID Token from Google Sign-In

    FavoriteRequest:
      type: object
      required: [target_type, target_id, title]
      properties:
        target_type:
          type: string
          enum: [search, physics, biology]
        target_id:
          type: string
        title:
          type: string

